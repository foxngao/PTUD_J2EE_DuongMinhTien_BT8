<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div th:replace="~{_layout :: navbar}"></div>

    <div class="container mt-4">
      <h2>Products</h2>

      <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
      <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

      <a th:href="@{/products/create}" class="btn btn-success mb-3"
        >Create New Product</a
      >

      <form method="get" th:action="@{/products}" class="row g-3 mb-3">
        <div class="col-md-4">
          <input
            type="text"
            class="form-control"
            name="keyword"
            placeholder="Nhập tên sản phẩm"
            th:value="${keyword}"
          />
        </div>
        <div class="col-md-3">
          <select class="form-select" name="categoryId">
            <option value="">Tất cả category</option>
            <option
              th:each="category : ${categories}"
              th:value="${category.id}"
              th:text="${category.name}"
              th:selected="${categoryId != null and category.id == categoryId}"
            ></option>
          </select>
        </div>
        <div class="col-md-3">
          <select class="form-select" name="sort">
            <option value="">Mặc định</option>
            <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá tăng dần</option>
            <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá giảm dần</option>
          </select>
        </div>
        <div class="col-md-2 d-grid gap-2">
          <button type="submit" class="btn btn-primary">Lọc</button>
        </div>
      </form>

      <table class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Price</th>
            <th>Image</th>
            <th>Category Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="product, iterStat : ${products}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
            <td>
              <img
                th:if="${product.imageFileName != null and !product.imageFileName.isEmpty()}"
                th:src="@{'/uploads/' + ${product.imageFileName}}"
                alt="Product Image"
                style="max-width: 120px; max-height: 100px"
              />
            </td>
            <td
              th:text="${product.category != null ? product.category.name : 'N/A'}"
            ></td>
            <td>
              <a
                th:href="@{'/products/edit/' + ${product.id}}"
                class="btn btn-sm btn-primary"
                >Edit</a
              >
              <form
                th:action="@{'/products/delete/' + ${product.id}}"
                method="post"
                style="display: inline"
              >
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button
                  type="submit"
                  class="btn btn-sm btn-danger"
                  onclick="return confirm('Bạn có chắc muốn xóa?');"
                >
                  Delete
                </button>
              </form>
              <form
                th:action="@{'/cart/add/' + ${product.id}}"
                method="post"
                style="display: inline"
                class="ms-1"
              >
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="quantity" value="1" />
                <button type="submit" class="btn btn-sm btn-warning">Add to Cart</button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="6" class="text-center">Không có sản phẩm nào.</td>
          </tr>
        </tbody>
      </table>

      <div class="d-flex justify-content-between align-items-center" th:if="${productPage != null and productPage.totalPages > 0}">
        <a
          class="btn btn-outline-secondary"
          th:classappend="${productPage.first} ? ' disabled' : ''"
          th:href="@{/products(page=${productPage.number - 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}"
        >Previous</a>

        <span>
          Trang <strong th:text="${productPage.number + 1}">1</strong> /
          <strong th:text="${productPage.totalPages}">1</strong>
        </span>

        <a
          class="btn btn-outline-secondary"
          th:classappend="${productPage.last} ? ' disabled' : ''"
          th:href="@{/products(page=${productPage.number + 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}"
        >Next</a>
      </div>
    </div>

    <div th:replace="~{_layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

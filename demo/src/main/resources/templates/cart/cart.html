<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div th:replace="~{_layout :: navbar}"></div>

    <div class="container mt-4">
      <h2>Giỏ hàng</h2>

      <table class="table table-bordered" th:if="${!cart.empty}">
        <thead class="table-dark">
          <tr>
            <th>Tên</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Tổng tiền</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${cart.items}">
            <td th:text="${item.productName}"></td>
            <td th:text="${item.price}"></td>
            <td>
              <form th:action="@{'/cart/update/' + ${item.productId}}" method="post" class="d-flex gap-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="number" name="quantity" min="1" class="form-control" th:value="${item.quantity}" style="max-width: 100px" />
                <button type="submit" class="btn btn-sm btn-primary">Update</button>
              </form>
            </td>
            <td th:text="${item.lineTotal}"></td>
            <td>
              <form th:action="@{'/cart/remove/' + ${item.productId}}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-sm btn-danger">Remove</button>
              </form>
            </td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <th colspan="2">Tổng cộng</th>
            <th th:text="${cart.totalQuantity}"></th>
            <th th:text="${cart.totalAmount}"></th>
            <th></th>
          </tr>
        </tfoot>
      </table>

      <div class="alert alert-info" th:if="${cart.empty}">Giỏ hàng đang trống.</div>

      <form th:if="${!cart.empty}" th:action="@{/checkout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn btn-success">Đặt hàng</button>
      </form>
    </div>

    <div th:replace="~{_layout :: footer}"></div>
  </body>
</html>
